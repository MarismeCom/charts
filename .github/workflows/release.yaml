name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - "artifacthub-repo.yml"
      - ".github/workflows/release.yaml"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
          pages_branch: gh-pages
          skip_existing: true

      - name: Publish Artifact Hub metadata
        run: |
          tmpdir="$(mktemp -d)"
          cp artifacthub-repo.yml "$tmpdir/artifacthub-repo.yml"
          git fetch origin gh-pages
          git checkout gh-pages
          cp "$tmpdir/artifacthub-repo.yml" artifacthub-repo.yml
          touch .nojekyll
          git add artifacthub-repo.yml .nojekyll
          git diff --cached --quiet || git commit -m "Update Artifact Hub metadata"
          git push origin gh-pages

